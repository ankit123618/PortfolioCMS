name: portfolio
services:
  app:
    build:
      context: ..
      dockerfile: ./docker/Dockerfile
    container_name: portfolio-app
    depends_on:
      db:
        condition: service_healthy
    environment:
      DB_HOST: db
      DB_PORT: 3306
      DB_NAME: ${DB_NAME:-portfolio}
      DB_USER: ${DB_USER:-appuser}
      DB_PASS: ${DB_PASS:-apppassword}
      DB_CHARSET: utf8mb4
      APP_ADDR: :8080
      APP_SECRET: ${APP_SECRET:-dev-secret-change-me}
    ports:
      - "8080:8080"
    volumes:
      - ../uploads:/app/uploads:Z
    restart: unless-stopped

  db:
    image: mysql:8.4
    container_name: portfolio-app-db
    environment:
      MYSQL_DATABASE: ${DB_NAME:-portfolio}
      MYSQL_USER: ${DB_USER:-appuser}
      MYSQL_PASSWORD: ${DB_PASS:-apppassword}
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASS:-rootpassword}
    volumes:
      - db_data:/var/lib/mysql
      - ../sql:/docker-entrypoint-initdb.d:ro,Z
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-uroot", "-p${MYSQL_ROOT_PASSWORD:-rootpassword}"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 15s
    restart: unless-stopped

volumes:
  db_data:
