apiVersion: apps/v1
kind: Deployment
metadata:
  name: portfolio-cms
spec:
  replicas: 2
  selector:
    matchLabels:
      app: portfolio-cms
  template:
    metadata:
      labels:
        app: portfolio-cms
    spec:
      containers:
        - name: portfolio-cms
          image: ankit123618/portfolio-cms:latest
          imagePullPolicy: Always
          env:
            - name: APP_ADDR
              value: ":8080"
          ports:
            - containerPort: 8080
